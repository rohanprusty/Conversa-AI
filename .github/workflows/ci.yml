name: Conversa AI CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install Server Dependencies
      run: |
        cd Server
        npm install

    - name: Install Client Dependencies & Build
      run: |
        cd Client
        npm install
        npm run build
